schema_version: 1

context:
  name: llama-index-program-openai
  version: "0.3.2"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/llama_index_program_openai-${{ version }}.tar.gz
    sha256: 04c959a2e616489894bd2eeebb99500d6f1c17d588c3da0ddc75ebd3eb7451ee
  # https://github.com/run-llama/llama_index/issues/10806
  - url: https://raw.githubusercontent.com/run-llama/llama_index/main/LICENSE
    sha256: 24f40b5190fdacabc24ddbb5f76364d15e4f030925220ea300d8a2dd4993c8cb

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - llama-index-llms-openai >=0.4.0,<0.5
    - llama-index-core >=0.12.0,<0.13
    # not yet in pyproject.toml https://github.com/run-llama/llama_index/issues/10810
    - llama-index-agent-openai >=0.4.0,<0.5

tests:
  - python:
      imports:
        - llama_index.program.openai
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: llama-index program openai integration
  license: MIT
  license_file: LICENSE
  homepage: https://llamaindex.ai
  repository: https://github.com/run-llama/llama_index/tree/main/llama-index-integrations/program/llama-index-program-openai

extra:
  recipe-maintainers:
    - jan-janssen
    - pavelzw
